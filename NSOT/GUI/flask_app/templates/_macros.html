{% macro next_steps(links, label="Next Steps") %}
<div class="next-steps">
  <div class="next-steps-label">{{ label }}</div>
  <div class="next-steps-grid">
    {% for link in links %}
    <a href="{{ link.url }}" class="next-step-link">
      <span class="next-step-icon">{{ link.icon | safe }}</span>
      <span class="next-step-info">
        <span class="next-step-title">{{ link.title }}</span>
        <span class="next-step-desc">{{ link.desc }}</span>
      </span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.35;flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
    {% endfor %}
  </div>
</div>
{% endmacro %}
