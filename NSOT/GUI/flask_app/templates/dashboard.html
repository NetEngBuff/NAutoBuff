{% extends "base.html" %}
{% block title %}Dashboard - NAutoBuff{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Network Dashboard</h1>
  <p class="page-description">Real-time network monitoring and metrics via Grafana</p>
</div>

<div class="iframe-container">
  <iframe
    id="grafanaFrame"
    src="{{ grafana_dashboard_url }}"
    title="Grafana Dashboard"
    style="width:100%;height:80vh;border:none;border-radius:var(--radius-md);"
  ></iframe>
</div>

<div style="margin-top:var(--space-3);display:flex;justify-content:flex-end;gap:var(--space-2);">
  <a href="{{ influxdb_url }}" target="_blank" class="btn btn-secondary btn-sm">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;">
      <ellipse cx="12" cy="5" rx="9" ry="3"/>
      <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
      <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
    </svg>
    Open InfluxDB
  </a>
  <a href="{{ grafana_dashboard_url }}" target="_blank" class="btn btn-secondary btn-sm">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;">
      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
      <polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/>
    </svg>
    Open in Grafana
  </a>
</div>
{% endblock %}
