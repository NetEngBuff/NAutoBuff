<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — NAutoBuff v2</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/v2.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,212,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.012) 1px,transparent 1px); background-size:52px 52px; pointer-events:none; z-index:0; }
    .signup-wrap { position:relative; z-index:1; width:100%; max-width:420px; padding:var(--sp-4); }
    .signup-logo { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:28px; }
    .signup-logo-icon { width:40px; height:40px; background:linear-gradient(135deg,var(--vlab),#0099BB); border-radius:var(--r-lg); display:flex; align-items:center; justify-content:center; box-shadow:0 0 20px var(--vlab-glow); }
    .signup-logo-title { font-family:var(--font-display); font-size:14px; font-weight:700; letter-spacing:0.1em; color:var(--t1); }
    .signup-card { background:var(--nb-surface); border:1px solid var(--nb-border); border-radius:var(--r-xl); padding:30px; box-shadow:var(--sh-xl); position:relative; overflow:hidden; }
    .signup-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--vlab),transparent); }
  </style>
</head>
<body>
  <div class="signup-wrap">
    <div class="signup-logo">
      <div class="signup-logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
      </div>
      <span class="signup-logo-title">NAUTOBUFF</span>
    </div>

    <div class="signup-card">
      <h1 style="font-size:16px;font-weight:600;color:var(--t1);text-align:center;margin-bottom:6px;">Create Account</h1>
      <p style="font-size:13px;color:var(--t3);text-align:center;margin-bottom:24px;">You were invited to join NAutoBuff</p>

      {% if error %}
      <div class="alert alert-error" style="margin-bottom:var(--sp-5);">
        <span class="alert-icon">✘</span>
        <div class="alert-content">{{ error }}</div>
      </div>
      {% endif %}

      <form method="POST" class="form">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" autofocus required placeholder="Choose a username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" required placeholder="Min 8 characters">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-input" required placeholder="Repeat password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:var(--sp-2);">
          Create Account
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
    </div>
  </div>
</body>
</html>
